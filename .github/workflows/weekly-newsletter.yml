name: Weekly Newsletter Update

on:
  schedule:
    # 매주 금요일 오전 10:00 KST (01:00 UTC)
    - cron: '0 1 * * 5'
  workflow_dispatch:   # 수동 실행 허용

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # index.html 커밋/푸시 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit & push updated newsletter
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 변경이 없으면 커밋 스킵
          git diff --staged --quiet && echo "No changes — skipping commit." || \
            git commit -m "chore: weekly newsletter $(date +'%Y-%m-%d')"
          git push
